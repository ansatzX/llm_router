model = "gpt-5.5"
model_reasoning_effort = "high"

[model_providers]
[model_providers.llm_router]
name = "llm_router"
base_url = "http://127.0.0.1:9876/v1"
wire_api = "responses"
requires_openai_auth = false

[model_providers.aihubmix]
name = "aihubmix"
base_url = "https://aihubmix.com/v1"
env_key = "AIHUBMIX_API_KEY"
wire_api = "responses"
requires_openai_auth = false


[tui]
status_line = [
    "model-with-reasoning",
    "current-dir",
    "git-branch",
    "run-state",
    "context-used",
    "five-hour-limit",
    "context-window-size",
    "fast-mode",
]

